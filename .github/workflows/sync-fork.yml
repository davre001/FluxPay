name: Sync to Dami904 fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Dami904/FluxPay
        run: |
          git remote add fork https://x-access-token:${{ secrets.DAMI904_PAT }}@github.com/Dami904/FluxPay.git
          git push fork main
