[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
via_ir = false
ffi = false

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
morph_hoodi = "https://rpc-hoodi.morphl2.io"
morph_mainnet = "https://rpc.morphl2.io"
localhost = "http://localhost:8545"

[etherscan]
morph_holesky = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer-holesky.morphl2.io/api" }
morph_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.morphl2.io/api" }
